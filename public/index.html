<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zenok — WhatsApp Pairing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .code-char {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.75rem;
      height: 3.5rem;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0;
      color: #34d399;
    }
    .pulse-dot {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 flex items-center justify-center p-4">

  <div class="w-full max-w-md">

    <!-- Header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-emerald-500/10 border border-emerald-500/20 mb-4">
        <svg class="w-8 h-8 text-emerald-400" fill="currentColor" viewBox="0 0 24 24">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">Zenok WhatsApp Bot</h1>
      <p class="text-slate-400 text-sm mt-1">Generate a pairing code to link your WhatsApp account</p>
    </div>

    <!-- Card -->
    <div class="bg-slate-800/60 backdrop-blur border border-slate-700/50 rounded-2xl p-6 shadow-2xl">

      <!-- Connection Status -->
      <div class="flex items-center justify-between mb-6 p-3 rounded-xl bg-slate-900/50 border border-slate-700/40">
        <span class="text-sm text-slate-400 font-medium">Bot Status</span>
        <div id="status-badge" class="flex items-center gap-2">
          <span id="status-dot" class="w-2 h-2 rounded-full bg-slate-500 pulse-dot"></span>
          <span id="status-text" class="text-sm font-semibold text-slate-400">Checking...</span>
        </div>
      </div>

      <!-- Phone Input -->
      <div class="mb-4">
        <label for="phone" class="block text-sm font-medium text-slate-300 mb-2">
          Phone Number
        </label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400 text-sm font-medium pointer-events-none">+</span>
          <input
            id="phone"
            type="tel"
            placeholder="92XXXXXXXXXX"
            maxlength="12"
            class="w-full bg-slate-900/70 border border-slate-600 text-white placeholder-slate-500 rounded-xl pl-7 pr-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500/50 transition"
          />
        </div>
        <p class="text-xs text-slate-500 mt-1.5">Format: 92 (Pakistan) + 10-digit number, e.g. 923001234567</p>
      </div>

      <!-- Request Button -->
      <button
        id="request-btn"
        onclick="requestPairingCode()"
        class="w-full bg-emerald-500 hover:bg-emerald-400 active:bg-emerald-600 disabled:opacity-50 disabled:cursor-not-allowed text-white font-semibold py-3 px-4 rounded-xl transition-all duration-150 text-sm flex items-center justify-center gap-2"
      >
        <svg id="btn-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
        </svg>
        <span id="btn-text">Generate Pairing Code</span>
      </button>

      <!-- Error Message -->
      <div id="error-box" class="hidden mt-4 p-3 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm text-center"></div>

      <!-- Pairing Code Display -->
      <div id="code-section" class="hidden mt-6">
        <div class="border-t border-slate-700/50 pt-5">
          <p class="text-center text-xs text-slate-400 uppercase tracking-widest font-semibold mb-4">Your Pairing Code</p>
          <div id="code-display" class="flex items-center justify-center gap-1.5 mb-4"></div>
          <div class="bg-slate-900/50 border border-slate-700/40 rounded-xl p-3 text-center">
            <p class="text-xs text-slate-400">
              Open WhatsApp → <span class="text-slate-300">Linked Devices</span> → <span class="text-slate-300">Link with phone number</span> → enter the code above
            </p>
          </div>
          <p id="code-timer" class="text-center text-xs text-slate-500 mt-3"></p>
        </div>
      </div>

    </div>

    <!-- Footer -->
    <p class="text-center text-xs text-slate-600 mt-6">Zenok Bot &mdash; Powered by Baileys</p>
  </div>

  <script>
    let statusInterval = null;
    let timerInterval = null;

    // Poll connection status every 5 seconds
    async function checkStatus() {
      try {
        const res = await fetch('/api/connection-status');
        const data = await res.json();
        const dot = document.getElementById('status-dot');
        const text = document.getElementById('status-text');

        if (data.status === 'connected') {
          dot.className = 'w-2 h-2 rounded-full bg-emerald-400';
          text.className = 'text-sm font-semibold text-emerald-400';
          text.textContent = 'Connected';
        } else if (data.status === 'connecting') {
          dot.className = 'w-2 h-2 rounded-full bg-yellow-400 pulse-dot';
          text.className = 'text-sm font-semibold text-yellow-400';
          text.textContent = 'Connecting…';
        } else {
          dot.className = 'w-2 h-2 rounded-full bg-red-400';
          text.className = 'text-sm font-semibold text-red-400';
          text.textContent = 'Disconnected';
        }
      } catch (e) {
        const dot = document.getElementById('status-dot');
        const text = document.getElementById('status-text');
        dot.className = 'w-2 h-2 rounded-full bg-slate-500';
        text.className = 'text-sm font-semibold text-slate-400';
        text.textContent = 'Unavailable';
      }
    }

    function renderCode(code) {
      const display = document.getElementById('code-display');
      display.innerHTML = '';
      const chars = code.replace(/-/g, '').split('');
      chars.forEach((ch, i) => {
        if (i === 4) {
          const sep = document.createElement('span');
          sep.className = 'text-slate-500 text-xl font-light mx-0.5';
          sep.textContent = '–';
          display.appendChild(sep);
        }
        const span = document.createElement('span');
        span.className = 'code-char';
        span.textContent = ch;
        display.appendChild(span);
      });
    }

    function startCodeTimer(seconds) {
      clearInterval(timerInterval);
      let remaining = seconds;
      const timerEl = document.getElementById('code-timer');
      timerEl.textContent = `Code expires in ${remaining}s`;
      timerInterval = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
          clearInterval(timerInterval);
          timerEl.textContent = 'Code may have expired — request a new one';
          timerEl.className = 'text-center text-xs text-red-400 mt-3';
        } else {
          timerEl.textContent = `Code expires in ${remaining}s`;
        }
      }, 1000);
    }

    async function requestPairingCode() {
      const phone = document.getElementById('phone').value.trim();
      const btn = document.getElementById('request-btn');
      const btnText = document.getElementById('btn-text');
      const btnIcon = document.getElementById('btn-icon');
      const errorBox = document.getElementById('error-box');
      const codeSection = document.getElementById('code-section');

      // Validate
      if (!/^92\d{10}$/.test(phone)) {
        errorBox.textContent = 'Invalid format. Use 92 followed by 10 digits (e.g. 923001234567).';
        errorBox.classList.remove('hidden');
        codeSection.classList.add('hidden');
        return;
      }

      errorBox.classList.add('hidden');
      btn.disabled = true;
      btnText.textContent = 'Requesting…';
      btnIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>`;

      try {
        const res = await fetch('/api/request-pairing-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phoneNumber: phone })
        });

        const data = await res.json();

        if (!res.ok || data.error) {
          throw new Error(data.error || 'Failed to generate pairing code');
        }

        renderCode(data.code);
        codeSection.classList.remove('hidden');
        document.getElementById('code-timer').className = 'text-center text-xs text-slate-500 mt-3';
        startCodeTimer(60);

      } catch (err) {
        errorBox.textContent = err.message || 'Something went wrong. Please try again.';
        errorBox.classList.remove('hidden');
        codeSection.classList.add('hidden');
      } finally {
        btn.disabled = false;
        btnText.textContent = 'Generate Pairing Code';
        btnIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>`;
      }
    }

    // Allow Enter key to trigger request
    document.getElementById('phone').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') requestPairingCode();
    });

    // Start polling
    checkStatus();
    statusInterval = setInterval(checkStatus, 5000);
  </script>
</body>
</html>
